<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dados das Instituições</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 6px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      transition: all 0.2s;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 500;
    }
    
    .back-link:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .instituicao-selector {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }
    
    .instituicao-selector label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 14px;
    }
    
    .instituicao-selector select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      background: white;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }
    
    .instituicao-selector select:hover {
      border-color: var(--border-hover);
    }
    
    .instituicao-selector select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .search-box {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }
    
    .search-box input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.2s;
      color: var(--text);
    }
    
    .search-box input:hover {
      border-color: var(--border-hover);
    }
    
    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .stat-box {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      text-align: center;
      border: 1px solid var(--border);
      border-top: 3px solid var(--primary);
    }
    
    .stat-box h3 {
      font-size: 36px;
      color: var(--primary);
      margin: 0;
      font-weight: 700;
    }
    
    .stat-box p {
      color: var(--text-secondary);
      margin: 8px 0 0 0;
      font-size: 14px;
    }
    
    .cursos-grid {
      display: grid;
      gap: 16px;
    }
    
    .curso-card {
      background: var(--card-bg);
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: all 0.2s;
      border: 1px solid var(--border);
    }
    
    .curso-card:hover {
      box-shadow: var(--shadow-md);
    }
    
    .curso-header {
      padding: 20px;
      background: linear-gradient(to right, var(--bg-blue-soft), transparent);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    
    .curso-header:hover {
      background: linear-gradient(to right, var(--bg-blue-light), var(--bg-secondary));
    }
    
    .curso-title {
      font-size: 15px;
      font-weight: 600;
      margin: 0;
      flex: 1;
      color: var(--text);
    }
    
    .curso-badge {
      background: var(--accent);
      color: white;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-left: 12px;
      font-weight: 500;
    }
    
    .curso-chevron {
      font-size: 18px;
      transition: transform 0.2s;
      margin-left: 12px;
      color: var(--text-secondary);
    }
    
    .curso-chevron.expanded {
      transform: rotate(90deg);
    }
    
    .curso-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    
    .curso-body.expanded {
      max-height: 3000px;
    }
    
    .disciplinas-list {
      padding: 20px;
    }
    
    .disciplina-item {
      padding: 12px 16px;
      border-left: 3px solid var(--accent);
      background: var(--bg-secondary);
      margin-bottom: 8px;
      border-radius: 4px;
      font-size: 14px;
      color: var(--text);
      transition: all 0.2s;
    }
    
    .disciplina-item:hover {
      background: #eff6ff;
      border-left-color: var(--primary);
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-state h2 {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .empty-state p {
      font-size: 14px;
      color: var(--text-light);
    }

    .download-btn {
      padding: 12px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .download-btn:hover {
      background: #1e40af;
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .download-btn:active {
      transform: translateY(0);
    }

    .info-section {
      background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%);
      padding: 32px;
      border-radius: 8px;
      box-shadow: var(--shadow-md);
      margin-bottom: 32px;
      color: white;
    }

    .info-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .info-nome {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: white;
    }

    .info-sigla {
      font-size: 14px;
      margin: 0;
      opacity: 0.9;
      color: rgba(255, 255, 255, 0.9);
    }

    .info-badge {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="home.html" class="back-link">← Voltar</a>
      <h1>Dados das<br>Instituições</h1>
      <p class="subtitle">Explore a estrutura curricular completa</p>
    </div>
  </header>

  <main class="container">
    <!-- Seletor de Instituição -->
    <section class="instituicao-selector">
      <label for="instituicaoSelect">Selecione a instituição:</label>
      <select id="instituicaoSelect">
        <option value="">Carregando...</option>
      </select>
    </section>

    <!-- Loading -->
    <div id="loading" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>Carregando dados...</p>
    </div>

    <!-- Info da Instituição -->
    <div id="infoSection" class="info-section" style="display: none;">
      <div class="info-header">
        <div>
          <h2 id="infoNome" class="info-nome"></h2>
          <p id="infoSigla" class="info-sigla"></p>
        </div>
        <div class="info-badge">✓ Dados Carregados</div>
      </div>
    </div>

    <!-- Estatísticas -->
    <div id="statsSection" style="display: none;">
      <div class="stats-row">
        <div class="stat-box">
          <h3 id="totalCursos">0</h3>
          <p>Cursos Disponíveis</p>
        </div>
        <div class="stat-box">
          <h3 id="totalDisciplinas">0</h3>
          <p>Disciplinas Totais</p>
        </div>
      </div>

      <!-- Ações e Busca -->
      <div style="display: flex; gap: 16px; margin-bottom: 16px;">
        <!-- Busca -->
        <div class="search-box" style="flex: 1; margin-bottom: 0;">
          <input
            type="text"
            id="searchInput"
            placeholder="🔍 Buscar por curso ou disciplina..."
          >
        </div>

        <!-- Botão de Download -->
        <button id="downloadBtn" class="download-btn" style="white-space: nowrap;">
          ⬇️ Baixar Dados
        </button>
      </div>
    </div>

    <!-- Lista de Cursos -->
    <section id="cursosSection" style="display: none;">
      <div id="cursosGrid" class="cursos-grid"></div>
    </section>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-state-icon">📚</div>
      <h2>Nenhum resultado encontrado</h2>
      <p>Tente buscar por outro termo ou limpe os filtros</p>
    </div>
  </main>

  <footer>
    <p>Sistema de Equivalências Curriculares — 2026</p>
  </footer>

  <script src="instituicoes.js"></script>
</body>
</html>
